{% extends 'base.html' %}
{% block title %}Choose Payment{% endblock %}
{% block content %}
<section class="section-padding">
    <section class="container">
        <article class="payment-card">
            <i class="fas fa-hand-holding-dollar fa-3x text-primary mb-3"></i>
            <h2 class="fw-bold">Choose Payment Method</h2>
            <p class="text-muted mb-4">Order #{{ order.id }} — Total ₹{{ order.total_amount }}</p>

            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">Cash on Delivery</h5>
                    <p class="card-text">Pay when your delivery arrives at your door.</p>
                    <form method="post" action="{% url 'cod_payment' order.id %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-primary-custom w-100">
                            <i class="fas fa-truck me-2"></i>
                            Confirm Cash on Delivery
                        </button>
                    </form>
                </div>
            </div>
        </article>
    </section>
</section>
{% endblock %}
