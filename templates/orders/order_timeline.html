{% extends 'base.html' %}
{% block title %}Order Timeline{% endblock %}
{% block content %}
<header class="page-header">
    <section class="container">
        <h1><i class="fas fa-list-check me-2"></i>Order Timeline</h1>
    </section>
</header>
<section class="section-padding pt-0">
    <section class="container" style="max-width: 560px;">
        <section class="order-timeline">
            <article class="timeline-step active">
                <p class="step-label mb-0"><i class="fas fa-check-circle me-2"></i>Order Placed</p>
            </article>
            <article class="timeline-step">
                <p class="step-label mb-0"><i class="fas fa-store me-2"></i>Restaurant Accepted</p>
            </article>
            <article class="timeline-step">
                <p class="step-label mb-0"><i class="fas fa-fire me-2"></i>Food Preparing</p>
            </article>
            <article class="timeline-step">
                <p class="step-label mb-0"><i class="fas fa-motorcycle me-2"></i>Out For Delivery</p>
            </article>
            <article class="timeline-step">
                <p class="step-label mb-0"><i class="fas fa-home me-2"></i>Delivered</p>
            </article>
        </section>
        <p class="text-center mt-4">
            <a href="{% url 'tracking_page' %}" class="btn btn-primary-custom">Live Tracking</a>
        </p>
    </section>
</section>
{% endblock %}
