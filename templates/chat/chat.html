{% extends 'base.html' %}
{% block title %}Support{% endblock %}
{% block content %}
<header class="page-header">
    <section class="container">
        <h1><i class="fas fa-headset me-2"></i>Customer Support</h1>
        <p class="text-muted mb-0">We're here to help</p>
    </section>
</header>
<section class="section-padding pt-0">
    <section class="container" style="max-width: 720px;">
        <section class="chat-container mb-3">
            {% for msg in messages %}
            <article class="chat-bubble chat-bubble-other">
                <p class="username mb-1">{{ msg.user.username }}</p>
                <p class="mb-0">{{ msg.message }}</p>
            </article>
            {% empty %}
            <p class="text-muted text-center py-5">No messages yet. Start the conversation!</p>
            {% endfor %}
        </section>
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="message" class="form-control form-control-lg" placeholder="Type your message..." required>
                <button class="btn btn-primary-custom px-4" type="submit">
                    <i class="fas fa-paper-plane me-1"></i> Send
                </button>
            </div>
        </form>
    </section>
</section>
{% endblock %}
